<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>English Trainer</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root { --bg:#0a0a0f; --surface:#13131c; --surface2:#1c1c2a; --accent:#00e5ff; --accent2:#ff6b6b; --accent3:#a8ff78; --text:#e8e8f0; --text-dim:#7a7a9a; --border:#2a2a3a; }
  * { box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; }
  body { font-family:'Noto Sans JP',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; padding-bottom:80px; overflow-x:hidden; }
  .header { background:linear-gradient(135deg,#0a0a1a,#13131c); border-bottom:1px solid var(--border); padding:16px 20px 12px; position:sticky; top:0; z-index:100; }
  .header h1 { font-family:'Space Mono',monospace; font-size:18px; color:var(--accent); letter-spacing:2px; text-transform:uppercase; }
  .header p { font-size:11px; color:var(--text-dim); margin-top:2px; }
  .tabs { display:flex; background:var(--surface); border-bottom:1px solid var(--border); position:sticky; top:68px; z-index:99; }
  .tab { flex:1; padding:12px 4px; text-align:center; font-size:10px; font-weight:700; cursor:pointer; border:none; background:none; color:var(--text-dim); transition:all 0.2s; position:relative; font-family:'Space Mono',monospace; }
  .tab .tab-icon { font-size:20px; display:block; margin-bottom:2px; }
  .tab.active { color:var(--accent); }
  .tab.active::after { content:''; position:absolute; bottom:0; left:10%; right:10%; height:2px; background:var(--accent); border-radius:2px; }
  .panel { display:none; padding:20px 16px; }
  .panel.active { display:block; }
  .card { background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:16px; margin-bottom:14px; }
  .card-title { font-family:'Space Mono',monospace; font-size:10px; letter-spacing:2px; text-transform:uppercase; color:var(--text-dim); margin-bottom:12px; }
  textarea { width:100%; background:var(--surface2); border:1px solid var(--border); border-radius:8px; color:var(--text); font-size:15px; line-height:1.7; padding:12px; resize:none; font-family:'Noto Sans JP',sans-serif; outline:none; transition:border-color 0.2s; }
  textarea:focus { border-color:var(--accent); }
  textarea::placeholder { color:var(--text-dim); }
  .btn { display:inline-flex; align-items:center; justify-content:center; gap:6px; padding:12px 20px; border-radius:8px; border:none; font-size:13px; font-weight:700; cursor:pointer; transition:all 0.15s; font-family:'Space Mono',monospace; }
  .btn:active { transform:scale(0.96); }
  .btn-primary { background:var(--accent); color:#000; }
  .btn-danger { background:var(--accent2); color:#fff; }
  .btn-ghost { background:var(--surface2); color:var(--text); border:1px solid var(--border); }
  .btn-success { background:var(--accent3); color:#000; }
  .btn-sm { padding:8px 14px; font-size:11px; }
  .btn:disabled { opacity:0.4; cursor:not-allowed; }
  .btn-full { width:100%; }
  .wpm-stats { display:grid; grid-template-columns:1fr 1fr 1fr; gap:10px; margin-bottom:14px; }
  .stat-box { background:var(--surface2); border:1px solid var(--border); border-radius:10px; padding:12px 8px; text-align:center; }
  .stat-value { font-family:'Space Mono',monospace; font-size:24px; font-weight:700; line-height:1; }
  .stat-label { font-size:9px; color:var(--text-dim); margin-top:4px; letter-spacing:1px; text-transform:uppercase; }
  .stat-box.highlight .stat-value { color:var(--accent); }
  .timer-display { font-family:'Space Mono',monospace; font-size:48px; color:var(--accent); text-align:center; padding:16px; background:var(--surface2); border-radius:10px; letter-spacing:4px; margin-bottom:12px; }
  .wpm-controls { display:flex; gap:10px; margin-bottom:12px; }
  .wpm-result { background:linear-gradient(135deg,var(--surface2),#1a1a2e); border:1px solid var(--accent); border-radius:10px; padding:16px; text-align:center; display:none; }
  .wpm-result.show { display:block; }
  .wpm-big { font-family:'Space Mono',monospace; font-size:56px; font-weight:700; color:var(--accent3); line-height:1; }
  .wpm-label { font-size:12px; color:var(--text-dim); margin-top:4px; }
  .wpm-feedback { font-size:14px; color:var(--text); margin-top:10px; }
  .speed-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:10px; }
  .speed-value { font-family:'Space Mono',monospace; font-size:20px; color:var(--accent); font-weight:700; }
  input[type=range] { width:100%; -webkit-appearance:none; height:4px; border-radius:2px; background:var(--border); outline:none; }
  input[type=range]::-webkit-slider-thumb { -webkit-appearance:none; width:22px; height:22px; border-radius:50%; background:var(--accent); cursor:pointer; box-shadow:0 0 10px rgba(0,229,255,0.5); }
  .speed-marks { display:flex; justify-content:space-between; font-size:9px; color:var(--text-dim); font-family:'Space Mono',monospace; margin-top:6px; }
  .tts-controls { display:flex; gap:10px; margin-bottom:14px; }
  .progress-bar-wrap { background:var(--surface2); border-radius:4px; height:4px; margin-bottom:12px; overflow:hidden; }
  .progress-bar { height:100%; background:linear-gradient(90deg,var(--accent),var(--accent3)); border-radius:4px; width:0%; transition:width 0.3s; }
  .highlight-text { line-height:1.9; font-size:15px; max-height:200px; overflow-y:auto; padding:12px; background:var(--surface2); border-radius:8px; border:1px solid var(--border); }
  .word-span { padding:1px 2px; border-radius:3px; transition:background 0.1s; }
  .word-span.spoken { background:rgba(0,229,255,0.15); color:var(--accent); }
  .word-span.current { background:var(--accent); color:#000; }
  .countdown-ring { display:flex; justify-content:center; margin-bottom:20px; }
  .ring-container { position:relative; width:160px; height:160px; }
  .ring-svg { transform:rotate(-90deg); }
  .ring-bg { fill:none; stroke:var(--border); stroke-width:8; }
  .ring-progress { fill:none; stroke:var(--accent2); stroke-width:8; stroke-linecap:round; stroke-dasharray:440; stroke-dashoffset:0; transition:stroke-dashoffset 1s linear,stroke 0.5s; }
  .ring-time { position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); font-family:'Space Mono',monospace; font-size:36px; font-weight:700; color:var(--accent2); }
  .speech-controls { display:flex; gap:10px; margin-bottom:12px; }
  .rec-indicator { display:flex; align-items:center; gap:8px; font-size:12px; color:var(--text-dim); margin-bottom:12px; min-height:20px; }
  .rec-dot { width:10px; height:10px; border-radius:50%; background:var(--accent2); opacity:0; flex-shrink:0; }
  .rec-dot.active { opacity:1; animation:blink 1s infinite; }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.2} }
  .recordings-list { display:flex; flex-direction:column; gap:10px; }
  .recording-item { background:var(--surface2); border:1px solid var(--border); border-radius:10px; padding:14px; }
  .rec-item-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:8px; }
  .rec-item-title { font-family:'Space Mono',monospace; font-size:11px; color:var(--accent); }
  .rec-item-actions { display:flex; gap:6px; margin-top:8px; flex-wrap:wrap; }
  .transcript-box { margin-top:10px; padding:10px; background:var(--bg); border-radius:8px; border:1px solid var(--border); display:none; }
  .transcript-box.show { display:block; }
  .transcript-box p { font-size:13px; color:var(--text); line-height:1.7; }
  .transcript-loading { font-size:12px; color:var(--text-dim); }
  .no-recordings { text-align:center; color:var(--text-dim); font-size:13px; padding:30px; }
  .badge { display:inline-block; padding:3px 8px; border-radius:20px; font-size:10px; font-family:'Space Mono',monospace; }
  .badge-cyan { background:rgba(0,229,255,0.15); color:var(--accent); border:1px solid rgba(0,229,255,0.3); }
  .badge-red { background:rgba(255,107,107,0.15); color:var(--accent2); border:1px solid rgba(255,107,107,0.3); }
  ::-webkit-scrollbar { width:4px; }
  ::-webkit-scrollbar-track { background:var(--surface2); }
  ::-webkit-scrollbar-thumb { background:var(--border); border-radius:2px; }
</style>
</head>
<body>
<div class="header">
  <h1>⚡ English Trainer</h1>
  <p>あなた専用の英語トレーニングアプリ</p>
</div>
<div class="tabs">
  <button class="tab active" onclick="switchTab('wpm',this)"><span class="tab-icon">📖</span>WPM</button>
  <button class="tab" onclick="switchTab('tts',this)"><span class="tab-icon">🔊</span>読上げ</button>
  <button class="tab" onclick="switchTab('speech',this)"><span class="tab-icon">🎙️</span>スピーチ</button>
</div>
<div id="panel-wpm" class="panel active">
  <div class="card">
    <div class="card-title">📝 英文を貼り付けてください</div>
    <textarea id="wpm-text" rows="6" placeholder="Paste your English text here..."></textarea>
  </div>
  <div class="wpm-stats">
    <div class="stat-box highlight"><div class="stat-value" id="word-count">0</div><div class="stat-label">WORDS</div></div>
    <div class="stat-box"><div class="stat-value" id="char-count">0</div><div class="stat-label">CHARS</div></div>
    <div class="stat-box"><div class="stat-value" id="sent-count">0</div><div class="stat-label">SENTS</div></div>
  </div>
  <div class="timer-display" id="wpm-timer">00:00.0</div>
  <div class="wpm-controls">
    <button class="btn btn-primary" style="flex:1" id="wpm-start-btn" onclick="wpmStart()">▶ スタート</button>
    <button class="btn btn-ghost" style="flex:1" id="wpm-stop-btn" onclick="wpmStop()" disabled>■ 終了</button>
    <button class="btn btn-ghost btn-sm" onclick="wpmReset()">↺</button>
  </div>
  <div class="wpm-result" id="wpm-result">
    <div class="wpm-big" id="wpm-value">—</div>
    <div class="wpm-label">WORDS PER MINUTE</div>
    <div class="wpm-feedback" id="wpm-feedback"></div>
  </div>
</div>
<div id="panel-tts" class="panel">
  <div class="card">
    <div class="card-title">📝 英文を貼り付けてください</div>
    <textarea id="tts-text" rows="5" placeholder="Paste your English text here..."></textarea>
  </div>
  <div class="card">
    <div class="card-title">再生速度</div>
    <div class="speed-header">
      <span class="card-title" style="margin:0">SPEED</span>
      <span class="speed-value" id="speed-display">1.0×</span>
    </div>
    <input type="range" id="speed-slider" min="5" max="20" value="10" step="1" oninput="updateSpeed(this.value)">
    <div class="speed-marks"><span>0.5×</span><span>0.75×</span><span>1.0×</span><span>1.25×</span><span>1.5×</span><span>1.75×</span><span>2.0×</span></div>
  </div>
  <div class="progress-bar-wrap"><div class="progress-bar" id="tts-progress"></div></div>
  <div class="tts-controls">
    <button class="btn btn-primary" style="flex:1" onclick="ttsPlay()">▶ 再生</button>
    <button class="btn btn-ghost" style="flex:1" onclick="ttsPause()">⏸ 一時停止</button>
    <button class="btn btn-ghost btn-sm" onclick="ttsStop()">■</button>
  </div>
  <div class="card">
    <div class="card-title">ハイライト表示</div>
    <div class="highlight-text" id="tts-highlight">テキストを貼り付けて再生するとここにハイライト表示されます。</div>
  </div>
</div>
<div id="panel-speech" class="panel">
  <div class="card">
    <div class="card-title">🎯 1分間スピーチ</div>
    <div class="countdown-ring">
      <div class="ring-container">
        <svg class="ring-svg" width="160" height="160" viewBox="0 0 160 160">
          <circle class="ring-bg" cx="80" cy="80" r="70"/>
          <circle class="ring-progress" id="ring-progress" cx="80" cy="80" r="70"/>
        </svg>
        <div class="ring-time" id="ring-time">1:00</div>
      </div>
    </div>
    <div class="rec-indicator">
      <div class="rec-dot" id="rec-dot"></div>
      <span id="rec-status">準備完了</span>
    </div>
    <div class="speech-controls">
      <button class="btn btn-danger" style="flex:1" id="rec-start-btn" onclick="recStart()">🎙 録音スタート</button>
      <button class="btn btn-ghost" style="flex:1" id="rec-stop-btn" onclick="recStop()" disabled>■ 停止</button>
    </div>
    <button class="btn btn-ghost btn-full" onclick="recReset()">↺ リセット</button>
  </div>
  <div class="card">
    <div class="card-title">📼 録音一覧</div>
    <div class="recordings-list" id="recordings-list">
      <div class="no-recordings">録音がまだありません</div>
    </div>
  </div>
</div><script>
function switchTab(id,el){
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.getElementById('panel-'+id).classList.add('active');
  el.classList.add('active');
}

// WPM
let wpmInterval=null,wpmStartTime=null,wpmRunning=false;
document.getElementById('wpm-text').addEventListener('input',updateTextStats);
function updateTextStats(){
  const text=document.getElementById('wpm-text').value.trim();
  const words=text?text.split(/\s+/).filter(w=>w.length>0):[];
  const sents=text?text.split(/[.!?]+/).filter(s=>s.trim().length>0):[];
  document.getElementById('word-count').textContent=words.length;
  document.getElementById('char-count').textContent=text.length;
  document.getElementById('sent-count').textContent=sents.length;
}
function wpmStart(){
  const text=document.getElementById('wpm-text').value.trim();
  if(!text){alert('英文を貼り付けてください');return;}
  wpmStartTime=Date.now();wpmRunning=true;
  document.getElementById('wpm-start-btn').disabled=true;
  document.getElementById('wpm-stop-btn').disabled=false;
  document.getElementById('wpm-result').classList.remove('show');
  wpmInterval=setInterval(wpmTick,100);
}
function wpmTick(){
  const elapsed=(Date.now()-wpmStartTime)/1000;
  const min=Math.floor(elapsed/60);
  const sec=Math.floor(elapsed%60);
  const tenth=Math.floor((elapsed%1)*10);
  document.getElementById('wpm-timer').textContent=
    String(min).padStart(2,'0')+':'+String(sec).padStart(2,'0')+'.'+tenth;
}
function wpmStop(){
  if(!wpmRunning)return;
  clearInterval(wpmInterval);wpmRunning=false;
  const elapsed=(Date.now()-wpmStartTime)/1000;
  const words=document.getElementById('wpm-text').value.trim().split(/\s+/).filter(w=>w.length>0).length;
  const wpm=Math.round((words/elapsed)*60);
  document.getElementById('wpm-value').textContent=wpm;
  document.getElementById('wpm-result').classList.add('show');
  document.getElementById('wpm-start-btn').disabled=false;
  document.getElementById('wpm-stop-btn').disabled=true;
  let f='';
  if(wpm<100)f='🌱 初心者レベル。ゆっくり丁寧に読めています！';
  else if(wpm<150)f='📚 平均的な英語リーダー。良い調子！';
  else if(wpm<200)f='⚡ 上級リーダー！素晴らしい速度です。';
  else if(wpm<250)f='🚀 英語ネイティブ並みの速読！';
  else f='🌟 超高速！スキャニングモードですか？';
  document.getElementById('wpm-feedback').textContent=f;
}
function wpmReset(){
  clearInterval(wpmInterval);wpmRunning=false;wpmStartTime=null;
  document.getElementById('wpm-timer').textContent='00:00.0';
  document.getElementById('wpm-start-btn').disabled=false;
  document.getElementById('wpm-stop-btn').disabled=true;
  document.getElementById('wpm-result').classList.remove('show');
}

// TTS
let ttsWords=[],ttsCurrentWord=0,ttsSpeed=1.0,ttsPaused=false;
function updateSpeed(val){
  ttsSpeed=val/10;
  document.getElementById('speed-display').textContent=ttsSpeed.toFixed(1)+'×';
  if(window.speechSynthesis.speaking){window.speechSynthesis.cancel();ttsPlayFromWord(0);}
}
function buildHighlight(text){
  ttsWords=text.match(/\S+/g)||[];
  document.getElementById('tts-highlight').innerHTML=ttsWords.map((w,i)=>
    `<span class="word-span" id="w-${i}">${w} </span>`).join('');
}
function ttsPlay(){
  const text=document.getElementById('tts-text').value.trim();
  if(!text){alert('英文を貼り付けてください');return;}
  if(ttsPaused&&window.speechSynthesis.paused){window.speechSynthesis.resume();ttsPaused=false;return;}
  window.speechSynthesis.cancel();
  buildHighlight(text);ttsCurrentWord=0;ttsPlayFromWord(0);
}
function ttsPlayFromWord(startIdx){
  const text=document.getElementById('tts-text').value.trim();
  if(!text)return;
  if(!ttsWords.length)buildHighlight(text);
  const utt=new SpeechSynthesisUtterance(text);
  utt.rate=ttsSpeed;utt.lang='en-US';
  let wordIdx=0;
  utt.onboundary=function(e){
    if(e.name==='word'){
      document.querySelectorAll('.word-span').forEach(s=>{
        s.classList.remove('current');
        if(parseInt(s.id.replace('w-',''))<wordIdx)s.classList.add('spoken');
      });
      const el=document.getElementById('w-'+wordIdx);
      if(el){el.classList.add('current');el.classList.remove('spoken');el.scrollIntoView({behavior:'smooth',block:'nearest'});}
      ttsCurrentWord=wordIdx;wordIdx++;
      document.getElementById('tts-progress').style.width=(wordIdx/ttsWords.length*100)+'%';
    }
  };
  utt.onend=function(){
    document.querySelectorAll('.word-span').forEach(s=>s.classList.remove('current','spoken'));
    document.getElementById('tts-progress').style.width='0%';
    ttsCurrentWord=0;
  };
  window.speechSynthesis.speak(utt);
}
function ttsPause(){
  if(window.speechSynthesis.speaking&&!window.speechSynthesis.paused){window.speechSynthesis.pause();ttsPaused=true;}
  else if(window.speechSynthesis.paused){window.speechSynthesis.resume();ttsPaused=false;}
}
function ttsStop(){
  window.speechSynthesis.cancel();ttsPaused=false;ttsCurrentWord=0;
  document.querySelectorAll('.word-span').forEach(s=>s.classList.remove('current','spoken'));
  document.getElementById('tts-progress').style.width='0%';
}

// RECORDING
let recMediaRecorder=null,recAudioChunks=[],recCountdown=null;
let recTimeLeft=60,recRecording=false,recNumber=0;
const CIRC=2*Math.PI*70;

function updateRing(t){
  const ratio=t/60;
  document.getElementById('ring-progress').style.strokeDashoffset=CIRC*(1-ratio);
  const hue=Math.round(ratio*120);
  document.getElementById('ring-progress').style.stroke=`hsl(${hue},80%,60%)`;
  document.getElementById('ring-time').style.color=`hsl(${hue},80%,60%)`;
  document.getElementById('ring-time').textContent=Math.floor(t/60)+':'+String(t%60).padStart(2,'0');
}

async function recStart(){
  try{
    const stream=await navigator.mediaDevices.getUserMedia({audio:true});
    recRecording=true;recAudioChunks=[];recTimeLeft=60;updateRing(60);
    document.getElementById('rec-start-btn').disabled=true;
    document.getElementById('rec-stop-btn').disabled=false;
    document.getElementById('rec-dot').classList.add('active');
    document.getElementById('rec-status').textContent='🔴 録音中...';
    recMediaRecorder=new MediaRecorder(stream);
    recMediaRecorder.ondataavailable=e=>{if(e.data.size>0)recAudioChunks.push(e.data);};
    recMediaRecorder.onstop=()=>{stream.getTracks().forEach(t=>t.stop());saveRecording();};
    recMediaRecorder.start(200);
    recCountdown=setInterval(()=>{
      recTimeLeft--;updateRing(recTimeLeft);
      if(recTimeLeft<=0)recStop();
    },1000);
  }catch(err){
    alert('マイクへのアクセスが拒否されました。\nアドレスバー左の🔒をタップしてマイクを「許可」にしてください。');
  }
}

function recStop(){
  if(!recRecording)return;
  recRecording=false;
  clearInterval(recCountdown);
  if(recMediaRecorder&&recMediaRecorder.state!=='inactive')recMediaRecorder.stop();
  document.getElementById('rec-start-btn').disabled=false;
  document.getElementById('rec-stop-btn').disabled=true;
  document.getElementById('rec-dot').classList.remove('active');
  document.getElementById('rec-status').textContent='録音完了！';
}

function recReset(){
  recStop();recTimeLeft=60;updateRing(60);
  document.getElementById('rec-status').textContent='準備完了';
  document.getElementById('rec-start-btn').disabled=false;
}

function saveRecording(){
  const blob=new Blob(recAudioChunks,{type:'audio/webm'});
  const url=URL.createObjectURL(blob);
  const duration=60-recTimeLeft;
  recNumber++;
  const now=new Date();
  const timeStr=now.getHours()+':'+String(now.getMinutes()).padStart(2,'0');
  const id='rec-'+Date.now();
  const list=document.getElementById('recordings-list');
  const noRec=list.querySelector('.no-recordings');
  if(noRec)noRec.remove();
  const item=document.createElement('div');
  item.className='recording-item';item.id=id;
  item.innerHTML=`
    <div class="rec-item-header">
      <span class="rec-item-title">録音 #${recNumber} — ${timeStr}</span>
      <span class="badge badge-cyan">${duration}秒</span>
    </div>
    <audio controls style="width:100%;margin:6px 0;accent-color:var(--accent);" src="${url}"></audio>
    <div class="rec-item-actions">
      <a class="btn btn-success btn-sm" href="${url}" download="speech-${recNumber}.webm">💾 保存</a>
      <button class="btn btn-ghost btn-sm" onclick="startTranscript('${id}','${url}')">📝 文字起こし</button>
      <button class="btn btn-ghost btn-sm" style="color:var(--accent2)" onclick="deleteRec('${id}','${url}')">🗑</button>
    </div>
    <div class="transcript-box" id="t-${id}">
      <p class="transcript-loading">文字起こし中...</p>
    </div>
  `;
  list.insertBefore(item,list.firstChild);
}

function startTranscript(id,url){
  const box=document.getElementById('t-'+id);
  box.classList.add('show');
  if(!('webkitSpeechRecognition' in window||'SpeechRecognition' in window)){
    box.querySelector('p').textContent='このブラウザは文字起こし非対応です。Chrome推奨。';
    return;
  }
  box.querySelector('p').textContent='音声を認識中...マイクに向かって話してください。';
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  const sr=new SR();
  sr.lang='en-US';sr.continuous=false;sr.interimResults=false;
  sr.onresult=e=>{
    const text=Array.from(e.results).map(r=>r[0].transcript).join(' ');
    box.querySelector('p').textContent=text||'（認識できませんでした）';
  };
  sr.onerror=()=>{box.querySelector('p').textContent='認識に失敗しました。もう一度お試しください。';};
  sr.start();
}

function deleteRec(id,url){
  URL.revokeObjectURL(url);
  const item=document.getElementById(id);
  if(item)item.remove();
  const list=document.getElementById('recordings-list');
  if(!list.querySelector('.recording-item'))list.innerHTML='<div class="no-recordings">録音がまだありません</div>';
}

updateRing(60);
</script>
